version: "3.9"

services:
  backend:
    build:
      context: ./server
    container_name: mern_backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env

  frontend:
    build:
      context: ./frontend
    container_name: mern_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"