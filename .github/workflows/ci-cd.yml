name: MERN CI/CD

on:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - run: npm test

      - run: npm run build

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run test:run

      - run: npm run build

  docker:
    needs: [server, frontend]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest \
            ./server

      - name: Build Frontend
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest \
            ./frontend

      - name: Push Backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest

      - name: Push Frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest